<div class="cadastro-pagina">
    <div class="cadastro-topo">
        <a href="../../index.html" class="cabecalho"></a>
    </div>
    

    <div class="pag-principal-total">

    

        <div class="cadastro-form-card">
            <h1 class="cadastro-titulo">Crie sua conta</h1>

            <form class="cadastro-form">

                <div class="campos-duplos">
                    <div class="campo-grupo">
                        <label>Nome</label>
                        <input type="text" placeholder="Nome">
                    </div>

                    <div class="campo-grupo">
                        <label>Sobrenome</label>
                        <input type="text" placeholder="Sobrenome">
                    </div>
                </div>

                <div class="campo-grupo">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com">
                </div>

                <div class="campo-grupo">
                    <label>Senha</label>
                    <input type="password" placeholder="Mínimo 8 caracteres">
                </div>

                <div class="campo-grupo">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="Repita a senha">
                </div>

                <div class="cadastro-termos">
                    <input type="checkbox" id="termos">
                    <label for="termos">
                        Eu concordo com os Termos de Uso e Política de Privacidade.
                    </label>
                </div>

                <button class="btn-primario">
                    Criar minha conta
                </button>

                <p class="cadastro-login-link">
                Já tem uma conta?
                <a routerLink="/login">Entrar</a>
                </p>
            </form>
        </div>

    </div>
</div>
